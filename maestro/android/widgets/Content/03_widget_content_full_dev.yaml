# Flow: All ConTENT Widgets — Combined Full Flow
# Tags: widgets, navigation, regression, negative, stability
# Description: Complete test suite for all ConTENT widget variants:
#   1. ConTENT (multi-item with list/detail/map + 6 negative scenarios)
#   2. Content only 1 data (single item, skips list view)
#   3. Content & Map (opens directly into map view)

appId: "de.endios.one.autokrafty.demo.debug"

tags:
  - widgets
  - navigation
  - regression
  - negative
  - stability

---

# ══════════════════════════════════════════════════════════════════════
#  WIDGET 1: ConTENT (multi-item)
# ══════════════════════════════════════════════════════════════════════

# ─── SAFETY RESET (cleanup from previous failed runs) ───
- setAirplaneMode:
    value: "disabled"
- pressKey: back
- pressKey: back

# ─── LAUNCH & OPEN WIDGET ───
- launchApp

- tapOn:
    text: "NICHT JETZT"
    optional: true

- extendedWaitUntil:
    visible: "ConTENT"
    timeout: 15000
- tapOn: "ConTENT"

# ─── CAT1 LIST VIEW ───
- extendedWaitUntil:
    visible: "Cat1"
    timeout: 5000
- waitForAnimationToEnd
- swipe:
    direction: DOWN
    duration: 100

# ─── OPEN CONTENT 1 DETAIL VIEW ───
- tapOn:
    point: "50%,19%"

- extendedWaitUntil:
    visible: "Beschreibung"
    timeout: 10000

- extendedWaitUntil:
    visible: "Öffnungszeiten"
    timeout: 10000

# ─── TOGGLE ÖFFNUNGSZEITEN (expand then collapse) ───
- tapOn: "Öffnungszeiten"
- swipe:
    direction: DOWN
    duration: 500
- tapOn: "Öffnungszeiten"
- swipe:
    direction: DOWN
    duration: 500

# ─── SCROLL TO KONTAKT & GALERIE ───
- scrollUntilVisible:
    element:
      text: "Kontakt"
    direction: DOWN
    timeout: 5000
- assertVisible: "Tel"
- assertVisible: "Email"

- scrollUntilVisible:
    element:
      text: "Galerie"
    direction: DOWN
    timeout: 5000

# ─── TAP ADDRESS → MAPS ───
- scrollUntilVisible:
    element:
      text: "Beschreibung"
    direction: UP
    timeout: 5000
- tapOn:
    point: "50%,19%"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- swipe:
    direction: DOWN
    duration: 2000
- pressKey: back
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# ─── TAP TEL → DIALER ───
- scrollUntilVisible:
    element:
      text: "Tel"
    direction: DOWN
    timeout: 5000
- tapOn: "Tel"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- swipe:
    direction: DOWN
    duration: 2000
- pressKey: back
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# ─── TAP EMAIL → EMAIL APP ───
- scrollUntilVisible:
    element:
      text: "Email"
    direction: DOWN
    timeout: 5000
- tapOn: "Email"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000
- swipe:
    direction: DOWN
    duration: 2000
- pressKey: back
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# ─── CLOSE DETAIL VIEW ───
- tapOn:
    point: "88%,8%"
- extendedWaitUntil:
    visible: "Cat1"
    timeout: 5000

# ─── SWITCH TO MAP VIEW ───
- tapOn:
    point: "94%,8%"
- waitForAnimationToEnd

# Pan the map in all directions
- swipe:
    start: "70%,50%"
    end: "30%,50%"
    duration: 1500
- waitForAnimationToEnd
- swipe:
    start: "50%,30%"
    end: "50%,70%"
    duration: 1500
- waitForAnimationToEnd
- swipe:
    start: "30%,50%"
    end: "70%,50%"
    duration: 1500
- waitForAnimationToEnd
- swipe:
    start: "50%,70%"
    end: "50%,30%"
    duration: 1500
- waitForAnimationToEnd

# ─── SWITCH BACK TO LIST VIEW ───
- tapOn:
    point: "94%,8%"
- extendedWaitUntil:
    visible: "Cat1"
    timeout: 5000

# ─── GO BACK TO HOME ───
- pressKey: back
- extendedWaitUntil:
    visible: "ConTENT"
    timeout: 5000


