    timeout: 15000
- tapOn: "Content & Map"

# ─── MAP VIEW (opens directly) ───
- extendedWaitUntil:
    visible: "Cat1"
    timeout: 10000

# ─── TAP PIN → POPUP WITH CONTENT NAME ───
- waitForAnimationToEnd
- extendedWaitUntil:
    visible: ".*"
    timeout: 3000
- tapOn:
    point: "49%,51%"
- extendedWaitUntil:
    visible: ".*"
    timeout: 5000

# ─── TAP POPUP → DETAIL VIEW ───
- tapOn:
    point: "50%,47%"
- extendedWaitUntil:
    visible: "Beschreibung"
    timeout: 10000

# ─── CLOSE DETAIL VIEW → BACK TO MAP ───
- extendedWaitUntil:
    visible: ".*"
    timeout: 2000
- tapOn:
    point: "93%,8%"

# ─── TAP LIST ICON → DETAIL VIEW (single item skips list) ───
