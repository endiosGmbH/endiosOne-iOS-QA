# ══════════════════════════════════════════════════════════════════════
#  WIDGET 2: Content only 1 data (single item, skips list view)
# ══════════════════════════════════════════════════════════════════════

- extendedWaitUntil:
    visible: "Content only 1 data"
    timeout: 15000
- tapOn: "Content only 1 data"

# ─── DETAIL VIEW (opens directly, no list view) ───
- extendedWaitUntil:
    visible: "Beschreibung"
    timeout: 10000

# Scroll down to see all available content
- swipe:
    start: "50%,70%"
    end: "50%,30%"
    duration: 800
- swipe:
    start: "50%,70%"
    end: "50%,30%"
    duration: 800

# Scroll back up
- swipe:
    start: "50%,30%"
    end: "50%,70%"
    duration: 800
- swipe:
    start: "50%,30%"
    end: "50%,70%"
    duration: 800

# Verify detail view still works
- extendedWaitUntil:
    visible: "Beschreibung"
    timeout: 5000

# ─── CLOSE DETAIL VIEW → HOME ───
- pressKey: back
- extendedWaitUntil:
    visible: "Content only 1 data"
    timeout: 5000


# ══════════════════════════════════════════════════════════════════════
#  WIDGET 3: Content & Map (opens directly into map view)
