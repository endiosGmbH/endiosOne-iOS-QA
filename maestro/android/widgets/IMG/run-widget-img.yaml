appId: de.endios.one.claudeautomation.demo.debug
name: "[IMG] Image Widget — full suite (single launch, Android)"
tags:
  - image-widget
# =============================================================================
# Consolidated SINGLE-LAUNCH flow for the Image Widget [IMG] — TestRail §12911.
# Android port of the iOS /run-widget pattern. App: Claude Automation (App-ID
# 1020, configId 1425), TEST env. Package: de.endios.one.claudeautomation.demo.debug
# Widget: oneWidgetImage 4.1.24-RC (source: oneWidgetImage-Android @ develop).
#
# DESIGN (per request):
#   * Functional cases run FIRST, each on a NON-crashing image tile.
#   * The rotatingRhythm=0 crash tile (18742) is exercised DEAD LAST as the
#     dedicated bug repro (AGENCY-7584), so a crash there cannot block anything.
#
# TILE MAPPING (config 1425, Product tab):
#   18741 "Bild clickable"       textBottom 4x4  rhythm 10  clickable   url2 only
#   18742 "Bild testing"         textBottom 8x4  rhythm 0   clickable   url1/2/3   <-- BUG tile, LAST
#   18763 "Bild" (plain,no title) plain 4x4      rhythm ""  clickable   url1/2/3   <-- viewer+swipe
#   18784 "Images not clickable" textTop 4x8     rhythm 4   notClickable url1/2/3  <-- rotation + notClickable
#   18785 "Invalid url" (plain)  plain 2x4       rhythm ""  clickable   404/bad-domain
#
# Case -> tile:
#   110108 rendering variants   -> baseline screenshots (plain 18763 / textBottom 18741 / textTop 18784)
#   110127 rotation @ rhythm    -> 18784  (non-zero, 3 images)
#   110114 tap opens viewer     -> 18763  (plain, 3 images, clickable)
#   110295 swipe cycles images  -> 18763  (in viewer from 110114)
#   110115 close viewer -> Home -> Back from 18763 viewer
#   110116 tap blocked          -> 18784  (notClickable=true)
#   110117 invalid url no crash -> 18785
#   BUG  AGENCY-7584            -> 18742  (rhythm=0 -> StackOverflowError) — LAST
#
# PRECONDITION (test data): tile 18742 (rhythm=0) MUST be placed so it is NOT
# visible on initial Product render (e.g. last position / scrolled off-screen),
# otherwise the app crashes on load and blocks every case. This flow only scrolls
# to 18742 in the final BUG step.
#
# SELECTOR NOTES: text-bearing tiles (18741/18742/18784) match by visible text.
# Plain tiles (18763/18785) expose no visible title — matched by content-desc
# ("Bild" / "Invalid url"); confirm/adjust on first run if a tile isn't found.
#
# SCREENSHOTS: /tmp/verify-widget/run-widget-img/. If Maestro takeScreenshot
# returns stale frames on this emulator, capture with `adb exec-out screencap -p`.
# =============================================================================
---
# ---- ONE app launch for the whole run ----
- launchApp:
    appId: de.endios.one.claudeautomation.demo.debug
    clearState: true
    permissions:
      all: allow            # pre-grant POST_NOTIFICATIONS etc. -> no permission dialog
- waitForAnimationToEnd:
    timeout: 8000

# Fallback dialog dismissal (curly + straight apostrophe) in case the grant is ignored
- runFlow:
    when: { visible: "Don’t allow" }
    commands: [ { tapOn: "Don’t allow" }, { waitForAnimationToEnd: { timeout: 1500 } } ]
- runFlow:
    when: { visible: "Don't allow" }
    commands: [ { tapOn: "Don't allow" }, { waitForAnimationToEnd: { timeout: 1500 } } ]

# Wait (cold start fetches config 1425 + tile images over network)
- extendedWaitUntil:
    visible: "Images not clickable"
    timeout: 40000
- waitForAnimationToEnd:
    timeout: 3000

# === 110108 — Tile rendering: plain / textBottom / textTop variants ===
- assertVisible: "Bild clickable"          # textBottom (18741)
- assertVisible: "Images not clickable"    # textTop (18784)
- takeScreenshot: /tmp/verify-widget/run-widget-img/01_tiles_variants

# === 110127 — Rotation follows rotatingRhythm (18784, rhythm 4, 3 images) ===
- scrollUntilVisible:
    element: { text: "Images not clickable" }
    direction: DOWN
    centerElement: true
    visibilityPercentage: 40
    waitToSettleTimeoutMs: 800
    timeout: 10000
- takeScreenshot: /tmp/verify-widget/run-widget-img/02_rotation_frame_a
- waitForAnimationToEnd:
    timeout: 10000                          # > 2x rhythm(4s) -> expect image change
- takeScreenshot: /tmp/verify-widget/run-widget-img/02b_rotation_frame_b

# === 110114 — Tap opens image viewer (18763 plain, 3 imgs, notClickable=false) ===
# 18763 is a PLAIN tile: no visible title AND empty content-desc -> not selectable by
# text/desc. It is the top-middle tile (view_pager bounds [362,71][710,419]) -> tap by
# coordinate. First scroll the top row into view via 18741 (which has a content-desc).
- scrollUntilVisible:
    element: { text: "Bild clickable" }
    direction: UP
    centerElement: false                     # top-edge element: do NOT center (Maestro fails to center top items)
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 800
    timeout: 10000
- tapOn:
    point: "50%, 10%"                        # 18763 plain tile (top-middle)
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-img/03_viewer_opened

# === 110295 — Swipe in viewer cycles images in order (url1 -> url2 -> url3) ===
- swipe: { start: "85%, 50%", end: "15%, 50%", duration: 400 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-img/04_viewer_next
- swipe: { start: "15%, 50%", end: "85%, 50%", duration: 400 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-img/04b_viewer_prev

# === 110115 — Close viewer returns to Home/Product ===
- back
- waitForAnimationToEnd: { timeout: 2000 }
- assertVisible: "Images not clickable"     # back on dashboard
- takeScreenshot: /tmp/verify-widget/run-widget-img/05_back_on_product

# === 110116 — Tap blocked when notClickable=true (18784) ===
- scrollUntilVisible:
    element: { text: "Images not clickable" }
    direction: DOWN
    centerElement: true
    visibilityPercentage: 40
    waitToSettleTimeoutMs: 800
    timeout: 10000
- tapOn: "Images not clickable"
- waitForAnimationToEnd: { timeout: 2500 }
- assertVisible: "Images not clickable"     # no viewer opened -> still on dashboard
- takeScreenshot: /tmp/verify-widget/run-widget-img/06_notclickable_no_viewer

# === 110117 — Negative: invalid/unreachable URL does not crash (18785) ===
- scrollUntilVisible:
    element: { text: "Invalid url" }         # plain tile content-desc
    direction: DOWN
    centerElement: true
    visibilityPercentage: 40
    waitToSettleTimeoutMs: 800
    timeout: 10000
- takeScreenshot: /tmp/verify-widget/run-widget-img/07_invalid_url_state
# scroll the invalid tile OFF-screen (up to top) then BACK to it — deterministic,
# avoids pull-to-refresh from free swipes near the top
- scrollUntilVisible:
    element: { text: "Bild clickable" }
    direction: UP
    centerElement: false
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 800
    timeout: 10000
- scrollUntilVisible:
    element: { text: "Invalid url" }
    direction: DOWN
    centerElement: false
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 800
    timeout: 10000
- assertVisible: "Invalid url"               # app still alive, tile still in layout
- takeScreenshot: /tmp/verify-widget/run-widget-img/07b_invalid_url_after_scroll

# =============================================================================
# === BUG REPRO — AGENCY-7584 — MUST BE THE LAST STEP (crashes the app) ========
# Tile 18742 "Bild testing" has rotatingRhythm=0. Scrolling it into view starts
# its CountDownTimer(0,0) -> onFinish recurses (BaseTileViewHolder.kt:50/51/168)
# -> StackOverflowError -> whole-app crash. Expected. Nothing runs after this.
# A crash here == bug reproduced (PASS for the bug case). If it does NOT crash,
# the rhythm=0 guard was fixed -> note it.
# =============================================================================
- takeScreenshot: /tmp/verify-widget/run-widget-img/08_before_bug_tile
# Direction depends on where 18742 sits on the dashboard. Per the precondition it
# should be LAST (scroll DOWN); in the current config 1425 it is at the top-right
# (scroll UP). Using UP + no-center to match the current layout.
- scrollUntilVisible:
    element: { text: "Bild testing" }
    direction: UP
    centerElement: false
    visibilityPercentage: 10
    waitToSettleTimeoutMs: 800
    timeout: 10000
- waitForAnimationToEnd: { timeout: 3000 }
- takeScreenshot: /tmp/verify-widget/run-widget-img/09_bug_rhythm0_result
