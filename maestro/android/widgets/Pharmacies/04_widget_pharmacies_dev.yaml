# Flow: Pharmacies Widget (DEV)
# Tags: widgets, pharmacies, navigation
# Description: Dev flow for Pharmacies widget — experiment here, sync to master when stable

appId: "de.endios.one.autokrafty.demo.debug"

tags:
  - widgets
  - pharmacies
  - navigation

---

# ─── SAFETY RESET (cleanup from previous failed runs) ───
- setAirplaneMode:
    value: "disabled"
- pressKey: back
- pressKey: back

# ─── LAUNCH APP ───
- launchApp

- tapOn:
    text: "NICHT JETZT"
    optional: true

# ─── WAIT FOR HOME SCREEN TO LOAD ───
- extendedWaitUntil:
    visible: "ConTENT"
    timeout: 15000
- waitForAnimationToEnd

# ══════════════════════════════════════════════════════════════════════
#  BACKEND-DRIVEN VALIDATION (load expected values from latest API capture)
#  Expected values come from ~/maestro_mitm/expected_pharmacy.js which is
#  regenerated by ~/maestro_mitm/generate_expected_pharmacy.sh against
#  the latest mitmproxy capture of GET /v2/connect (pharmacyService).
#  When backend data changes, re-run generate_expected_pharmacy.sh first.
# ══════════════════════════════════════════════════════════════════════
- runScript:
    file: /Users/yuriymatskiv/maestro_mitm/expected_pharmacy.js

# ══════════════════════════════════════════════════════════════════════
#  TEST 1: Pharmacy widget opens on "Notdienste" tab
# ══════════════════════════════════════════════════════════════════════

# ─── LET HOME SCREEN WIDGETS FULLY LOAD ───
# Videos/images may still be loading after "ConTENT" appears; without this
# initial wait the first swipe can be eaten or scroll past the target.
- waitForAnimationToEnd:
    timeout: 3000

# ─── SCROLL UNTIL PHARMACY WIDGET IS ON SCREEN ───
# Replaces 3 blind swipes with Maestro's scrollUntilVisible: it stops as
# soon as the target element is found, so it works regardless of where
# Pharmacy ends up after loading (no over/under-scroll).
- scrollUntilVisible:
    element:
      text: "Pharmacy"
    direction: DOWN
    timeout: 30000
    speed: 40
    visibilityPercentage: 100

# ─── DEBUG: confirm Pharmacy is fully visible ───
- takeScreenshot: pharmacy_scroll_target

# ─── HARD ASSERT (redundant safety check) ───
- assertVisible: "Pharmacy"

# ─── TAP ON PHARMACY WIDGET → OPENS DETAIL VIEW ───
- tapOn: "Pharmacy"
- waitForAnimationToEnd:
    timeout: 4000

# ─── VERIFY DETAIL VIEW OPENED ───
# Header still shows "Pharmacy" — reliable signal that the detail screen loaded.
# Toggle labels "Notdienste"/"Apotheken" are custom-rendered and not in the
# accessibility tree, so we rely on the screenshot for visual verification of
# which tab is active (darker = active).
- assertVisible: "Pharmacy"

# ─── DEBUG: capture opened detail view (visual check: Notdienste = darker) ───
- takeScreenshot: pharmacy_notdienste_opened

# ══════════════════════════════════════════════════════════════════════
#  TEST 2: Tap on any "A" pin → bottom sheet with pharmacy info
#  Notdienst pins are DYNAMIC (3rd-party, change daily). We can't pin the
#  test to specific coordinates, so we try several known plausible pin
#  positions; the first one that produces a bottom sheet wins.
# ══════════════════════════════════════════════════════════════════════

# ─── LET MAP TILES & MARKERS FULLY RENDER ───
- waitForAnimationToEnd:
    timeout: 3000

# ─── DEBUG: capture map state right before pin tap ───
- takeScreenshot: pharmacy_map_before_pin_tap

# ─── PIN-HUNT GRID: sub-flow taps a 6x8 grid of map cells until a
#                   bottom sheet appears. All cells after the first hit
#                   are skipped automatically by their `notVisible` guard.
- runFlow:
    file: /Users/yuriymatskiv/maestro_mitm/pharmacy_pin_hunt.yaml

# ─── VERIFY BOTTOM SHEET OPENED ───
# Apotheke title (any name from API) is the only field guaranteed to be
# present — Beschreibung/Kontakt are optional per schema.
- assertVisible: ${output.expected_any_apo_name}

# ─── DEBUG: capture detail bottom sheet ───
- takeScreenshot: pharmacy_pin_detail_opened

# ══════════════════════════════════════════════════════════════════════
#  TEST 3: Drag bottom sheet handle up → fully expanded Detail view
# ══════════════════════════════════════════════════════════════════════

# ─── DRAG SHEET HANDLE UPWARDS TO FULLY EXPAND ───
# Start point: drag handle confirmed via Maestro Studio at 50%, 78%.
# End point: near the top of the screen so the sheet expands to full height.
- swipe:
    start: "50%,78%"
    end: "50%,10%"
    duration: 1000
- waitForAnimationToEnd:
    timeout: 3000

# ─── VERIFY SHEET STILL OPEN AFTER DRAG ───
# Use the apotheke title (always present) instead of Kontakt/Beschreibung
# which are optional per app schema.
- assertVisible: ${output.expected_any_apo_name}

# ─── DEBUG: capture fully expanded Detail view ───
- takeScreenshot: pharmacy_detail_expanded

# ══════════════════════════════════════════════════════════════════════
#  TEST 4: Detail-view fields MUST match the API response
#
#  FULLY DYNAMIC: the sub-flow file below is regenerated from the latest
#  API capture by generate_expected_pharmacy.sh. It contains one block per
#  apotheke in TODAY's response (1, 3, 17 — doesn't matter). Only the
#  block whose name matches the on-screen bottom sheet actually runs its
#  asserts; the rest are silently skipped.
#  → Hard fail only if NO known apotheke matches (UI/API mismatch or stale
#    capture).
# ══════════════════════════════════════════════════════════════════════

# ─── FIELD INVENTORY SNAPSHOT (for manual review) ───
- takeScreenshot: pharmacy_detail_field_inventory

# ─── DYNAMIC PER-APOTHEKE VERIFICATION ───
# Sub-flow file is regenerated by generate_expected_pharmacy.sh; contains
# one block per apotheke in TODAY's response (count is not hardcoded).
- runFlow:
    file: /Users/yuriymatskiv/maestro_mitm/pharmacy_apotheke_blocks.yaml

# NOTE: If you ever see ONLY WARNING_* screenshots and no matched_apotheke_*,
# it means none of the API-known apotheke names appeared in the UI — either
# the capture is stale (re-run generate_expected_pharmacy.sh) or there is a
# real UI/API mismatch worth investigating.
