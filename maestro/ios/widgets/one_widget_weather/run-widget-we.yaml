# ===========================================================================
# SECTION C — 110052  Missing GPS permission handled  (RUN LAST)
# Launch with location UNSET via Maestro permissions (Maestro rejects 'deny'
# for location — iOS location has multiple states; 'unset' = not-determined,
# which makes the app request location and surface the OS prompt). No external
# simctl revoke needed. App must not crash / blank: it shows the feed with
# last-known data and/or the OS location prompt.
# NB: for a hard "Never/Denied" state instead of the prompt, run externally:
#   xcrun simctl privacy <udid> revoke location de.endios.one
# ===========================================================================
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
    permissions:
      location: unset
      notifications: allow
- waitForAnimationToEnd:
    timeout: 2500
# With location unset the app surfaces BOTH the ATT prompt and the OS location
# prompt on unpredictable delays. Poll ~12s, dismissing the ATT prompt AND
# tapping "Don't Allow" on the location prompt (→ genuine DENIED state). The
# fact that the app reaches the dashboard without crashing IS the 110052
# "missing-permission handled" evidence.
- repeat:
    times: 12
    commands:
      - runFlow:
          when:
            visible: "Ask App Not to Track"
          commands:
            - tapOn: "Ask App Not to Track"
      - runFlow:
          when:
            visible: "Don't Allow"
          commands:
            - tapOn: "Don't Allow"
      - waitForAnimationToEnd:
          timeout: 1000
- extendedWaitUntil:
    visible:
      text: "Auto"
    timeout: 60000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-we/110052_dashboard_with_denied_location
- scrollUntilVisible:
    element:
      text: "Wetter test"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 30
- tapOn: "Wetter test"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-we/110052_feed_with_denied_location
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-we/110052_after_back
