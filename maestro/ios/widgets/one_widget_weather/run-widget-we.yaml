            visible: "Ask App Not to Track"
          commands:
            - tapOn: "Ask App Not to Track"
      - waitForAnimationToEnd:
          timeout: 1000
- extendedWaitUntil:
    visible:
      text: "Auto"
    timeout: 60000
- scrollUntilVisible:
    element:
      text: "Wetter test"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 30
- tapOn: "Wetter test"
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-we/110053_coldstart1_feed

# ---- Cold start #2 ----
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
