- waitForAnimationToEnd:
    timeout: 2500
- repeat:
    times: 10
    commands:
      - runFlow:
          when:
            visible: "Ask App Not to Track"
          commands:
            - tapOn: "Ask App Not to Track"
      - waitForAnimationToEnd:
          timeout: 1000
- extendedWaitUntil:
    visible:
      text: "Auto"
    timeout: 60000
- scrollUntilVisible:
    element:
      text: "Wetter test"
    direction: DOWN
    timeout: 30000
    visibilityPercentage: 30
- tapOn: "Wetter test"
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-we/110053_coldstart2_feed

# ---- Cold start #3 + in-session nav cycle (feed → detail → feed → home) ----
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
    permissions:
      all: allow
- waitForAnimationToEnd:
    timeout: 2500
- repeat:
