appId: de.endios.one
name: "[OF] 110302 phase 1 — Online baseline (Mac on Wi-Fi)"
tags:
  - offers
# Phase 1: launch app on a healthy network, navigate into Feed, capture
# proof that the offers list loads. The shell wrapper then disables Wi-Fi
# on the host, and phase 2 captures the offline error state.
---
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 6000
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110302_01_dashboard_online
- tapOn: "Offer test"
- extendedWaitUntil:
    visible: "Angebote"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110302_02_feed_online
