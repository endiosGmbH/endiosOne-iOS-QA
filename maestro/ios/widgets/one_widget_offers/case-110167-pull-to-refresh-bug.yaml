appId: de.endios.one
name: "[OF] List View pull-to-refresh — stuck loading spinner repro"
tags:
  - offers
# Repro: User reports that on QA Feed, pulling-to-refresh shows a loading
# spinner that never disappears.
#
# Approach:
#   1. Launch + enter QA Feed.
#   2. Baseline screenshot.
#   3. Pull-to-refresh (downward swipe near top of list).
#   4. Capture screenshots at +2s / +6s / +12s / +20s.
#   If the spinner is still visible at +20s with no new content, the bug is
#   confirmed (a healthy refresh resolves in well under 2 seconds).
---
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 6000
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 4000

# Enter QA Feed via Mehr index 0
- tapOn:
    text: "Mehr"
    index: 0
- waitForAnimationToEnd:
    timeout: 8000
- extendedWaitUntil:
    visible: "Filterfunktion"
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-of-refreshbug/00_feed_baseline

# Pull-to-refresh: long downward swipe starting near the top of the list,
# below the nav/filter bar (filter bar sits ~y=12%).
- swipe:
    start: 50%, 20%
    end: 50%, 90%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-of-refreshbug/01_immediately_after_swipe

# +~2 seconds total
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-of-refreshbug/02_t_plus_2s

# +~6 seconds total
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-of-refreshbug/03_t_plus_6s

# +~12 seconds total
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: /tmp/verify-widget/run-widget-of-refreshbug/04_t_plus_12s

# +~20 seconds total — if spinner still visible here it's clearly stuck
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: /tmp/verify-widget/run-widget-of-refreshbug/05_t_plus_20s
