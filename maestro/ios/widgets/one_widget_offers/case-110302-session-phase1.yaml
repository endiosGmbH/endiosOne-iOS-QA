appId: de.endios.one
name: "[OF] 110302 session phase 1 — Online: prove dashboard + feed render"
tags:
  - offers
---
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 6000
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110302s_01_home_online
- tapOn: "Offer test"
- extendedWaitUntil:
    visible: "Angebote"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110302s_02_feed_online
- tapOn: "Back"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110302s_03_back_to_home
