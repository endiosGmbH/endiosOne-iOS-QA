appId: de.endios.one
name: "[OF] 110301 — Date picker (Gültigkeit) confirms date and filters Feed"
tags:
  - offers
# Filter sheet labels (Ab / Anwenden / Abbrechen / OK) are NOT in the
# accessibility tree (SwiftUI custom-control). Drive purely by coordinates.
# Layout per 110301_02 capture:
#   Filter & Sortierung header  ~y=40%
#   GÜLTIGKEIT row "Ab Beliebig" ~y=53-58%
#   KATEGORIEN section          ~y=63-77%
#   Anwenden / Abbrechen footer ~y=82-90% (typical iOS sheet bottom)
---
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 6000
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 4000
- tapOn: "Offer test"
- extendedWaitUntil:
    visible: "Angebote"
    timeout: 10000
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110301_01_feed_initial
- tapOn: "Filterfunktion"
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-of/110301_02_filter_open
# GÜLTIGKEIT row coord (y=55% per 110301_02 reference layout)
- tapOn:
    point: 50%, 55%
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-of/110301_03_datepicker_open
# Calendar widget often takes the upper half. Tap "OK" usually at the
# bottom-right of the picker. SwiftUI DatePicker's "OK" button label may
# or may not expose. Try text first, then coord fallback.
- runFlow:
    when:
      visible: "OK"
    commands:
      - tapOn: "OK"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110301_04_after_ok
# Close the filter sheet by swiping it down (or tapping outside)
- swipe:
    start: 50%, 30%
    end: 50%, 95%
    duration: 400
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-of/110301_05_feed_after_filter
- assertVisible: "Angebote"
