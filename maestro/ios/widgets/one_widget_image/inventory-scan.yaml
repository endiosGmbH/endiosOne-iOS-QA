appId: de.endios.one
name: "[IMG] Inventory scan — capture every dashboard tile + a11y label"
---
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 6000
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-img/inv/01-top
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/inv/02-mid1
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/inv/03-mid2
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/inv/04-mid3
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/inv/05-mid4
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/inv/06-bottom
