appId: de.endios.one
name: "[IMG] Image widget full suite v4 - canonical single-launch flow"
tags:
  - image

# ============================================================================
# CANONICAL CONSOLIDATED FLOW — Image [IMG] full suite, iOS (15 cases)
# v4 (2026-06-06). Validated against runs 2026-06-04 (v2) and 2026-06-05/06 (v3
# + retests). Run with:
#   ~/.maestro/bin/maestro --device BD791DDE-CE86-4ADA-AE09-EDAF6A647CE8 \
#     test maestro/widgets/IMG/run-widget-img.yaml \
#     --format junit --output /tmp/verify-widget/run-widget-img/report.xml
#
# COMPANION STEP (run AFTER this flow, for 110127 interval precision):
#   the Maestro 10s watch only proves "it rotates". To prove the configured
#   rhythm (3s default / 4s on 18784), run the simctl capture loop + PIL
#   crop-diff in rotation-capture.sh (same dir). Measured 2026-06-06:
#   18763 = 3.0s, 18742 = 3.0s, 18784 = 4.0s — exact match.
#
# v4 changes vs v3:
#   * 110117 scroll-back anchor switched to "Bild clickable" — the
#     "Images not clickable" a11y label is reliable only from shallow scroll
#     depth and broke BOTH v1 and v3 mid-flow. "Bild clickable" never flaked.
#   * Recovery rule: if the flow still dies mid-run, write a continuation
#     flow WITHOUT any launchApp (the app keeps its mid-run state) — proven
#     2026-06-05/06. Never relaunch.
#
# Known-issue expectations (do NOT re-triage as new findings):
#   * 119766 / 119770 FAIL by design until AGENCY-7600 ships — viewer chrome
#     is X-close only (93%,15%), zero share code in Widgets/WidgetImage/.
#   * 119767/119768/119769/119772/119773 BLOCKED (cascade) — not scripted.
#   * 110117 judged on the AVAILABLE tile 18785 (2x4, url1=404 + url2=dead
#     domain). Incidental precondition drift (8x8, url2 empty) noted only —
#     user ruling 2026-06-06.
#
# Tile mapping (config 1425, Product tab — different tile per case):
#   110127 (rotation rhythm)        → dashboard watch over rotators 18763/18742/18784
#   110114 (tap opens viewer)       → "Bild clickable" (18741, single URL url2, rhythm 10 → static)
#   110115 (close viewer to home)   → chained from 110114's viewer
#   110295 (swipe nav in viewer)    → "Bild testing" (18742, 3 URLs) via coord 83%, 22%
#   110116 (notClickable=true)      → "Images not clickable" (18784)
#   110117 (invalid URL no crash)   → "Invalid url" (18785, sits below top group)
#   119766+119770 (share presence)  → "Bild clickable" viewer (reuse OK: viewer chrome
#                                     under test, not tile behaviour)
#   119771 (no share entry)         → "Images not clickable" (own tap)
#   110108 (variant rendering)      → panorama over all tiles (LAST — leaves dashboard scrolled)
#
# Hard rules: ONE launchApp (clearState+clearKeychain), ONE baseline PTR,
# no between-case PTR, viewer recovery via X coord-tap 93%, 15%.
# ============================================================================
---
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 6000

# === Baseline pull-to-refresh + dashboard top screenshot ===
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-img/00_baseline_top

# ============================================================
# 110127 — rotation watch: +0s, +10s, +20s, +30s, +40s
# (proves rotation happens; exact rhythm via rotation-capture.sh)
# ============================================================
- assertVisible: "Bild clickable"
- takeScreenshot: /tmp/verify-widget/run-widget-img/110127_01_initial
- extendedWaitUntil:
    visible: "__SLEEP_PLACEHOLDER__"
    timeout: 10000
    optional: true
- takeScreenshot: /tmp/verify-widget/run-widget-img/110127_02_after_10s
- extendedWaitUntil:
    visible: "__SLEEP_PLACEHOLDER__"
    timeout: 10000
    optional: true
- takeScreenshot: /tmp/verify-widget/run-widget-img/110127_03_after_20s
- extendedWaitUntil:
    visible: "__SLEEP_PLACEHOLDER__"
    timeout: 10000
    optional: true
- takeScreenshot: /tmp/verify-widget/run-widget-img/110127_04_after_30s
- extendedWaitUntil:
    visible: "__SLEEP_PLACEHOLDER__"
    timeout: 10000
    optional: true
- takeScreenshot: /tmp/verify-widget/run-widget-img/110127_05_after_40s

# ============================================================
# 110114 — tap opens viewer (leaves viewer OPEN for 110115)
# ============================================================
- assertVisible: "Bild clickable"
- takeScreenshot: /tmp/verify-widget/run-widget-img/110114_01_dashboard
- tapOn: "Bild clickable"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-img/110114_02_viewer_open

# ============================================================
# 110115 — close viewer returns to dashboard
# ============================================================
- takeScreenshot: /tmp/verify-widget/run-widget-img/110115_01_viewer_open_from_110114
- tapOn:
    point: 93%, 15%
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110115_02_after_close
- assertVisible: "Bild clickable"

# ============================================================
# 110295 — viewer swipe cycles images ("Bild testing", coord 83%, 22%)
# Byte-identical 03/05 screenshots = CORRECT (right-swipe returns to
# previous image), not a dead gesture.
# ============================================================
- assertVisible: "Bild clickable"
- takeScreenshot: /tmp/verify-widget/run-widget-img/110295_01_dashboard_before
- tapOn:
    point: 83%, 22%
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-img/110295_02_viewer_initial
- swipe:
    start: 80%, 50%
    end: 20%, 50%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110295_03_after_swipe_left_1
- swipe:
    start: 80%, 50%
    end: 20%, 50%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110295_04_after_swipe_left_2
- swipe:
    start: 20%, 50%
    end: 80%, 50%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110295_05_after_swipe_right
- tapOn:
    point: 93%, 15%
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110295_06_after_close

# ============================================================
# 110116 — tap blocked when notClickable=true
# ============================================================
- assertVisible: "Images not clickable"
- takeScreenshot: /tmp/verify-widget/run-widget-img/110116_01_dashboard
- tapOn: "Images not clickable"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-img/110116_02_after_first_tap
- assertVisible: "Images not clickable"
- tapOn: "Images not clickable"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-img/110116_03_after_second_tap
- assertVisible: "Images not clickable"

# ============================================================
# 110117 — invalid URL no crash; 15s observe; scroll off + back
# v4: scroll-back anchored on "Bild clickable" (the "Images not
# clickable" anchor flaked in v1 AND v3 — do not revert).
# ============================================================
- takeScreenshot: /tmp/verify-widget/run-widget-img/110117_01_invalid_visible
- extendedWaitUntil:
    visible: "__SLEEP_PLACEHOLDER__"
    timeout: 15000
    optional: true
- takeScreenshot: /tmp/verify-widget/run-widget-img/110117_02_after_15s_observation
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110117_03_scrolled_off
- scrollUntilVisible:
    element:
      text: "Bild clickable"
    direction: UP
    timeout: 20000
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110117_04_scrolled_back
- assertVisible: "Bild clickable"

# ============================================================
# 119766 + 119770 — share icon presence in viewer (AGENCY-7600)
# Expected to FAIL until the ticket ships: chrome = X only.
# ============================================================
- takeScreenshot: /tmp/verify-widget/run-widget-img/119766_01_dashboard
- tapOn: "Bild clickable"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-img/119766_02_viewer_chrome
- extendedWaitUntil:
    visible: "__SLEEP_PLACEHOLDER__"
    timeout: 3000
    optional: true
- takeScreenshot: /tmp/verify-widget/run-widget-img/119766_03_viewer_chrome_after_3s
- tapOn:
    point: 93%, 15%
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-img/119766_04_after_close
- assertVisible: "Bild clickable"

# ============================================================
# 119771 — notClickable tile exposes no share entry point
# ============================================================
- assertVisible: "Images not clickable"
- tapOn: "Images not clickable"
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-img/119771_01_after_tap_no_viewer
- assertVisible: "Images not clickable"

# ============================================================
# 110108 — variant rendering panorama (LAST — leaves dashboard scrolled)
# Variants live on the widget core, not configValues: textBottom = 18741 +
# 18742 (title at bottom), textTop = 18784 (title at top), plain = 18763 +
# 18785 (no title).
# ============================================================
- takeScreenshot: /tmp/verify-widget/run-widget-img/110108_01_top
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110108_02_scroll1
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110108_03_scroll2
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110108_04_scroll3
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110108_05_scroll4
- swipe:
    start: 50%, 80%
    end: 50%, 20%
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-img/110108_06_bottom
