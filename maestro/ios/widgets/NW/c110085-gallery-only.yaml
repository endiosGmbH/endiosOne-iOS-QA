appId: de.endios.one
---
# C110085 — Gallery rotation. Anchor "Mehr" with centerElement: true to place
# Nachrichten Gallery title row at center (~y=50%); Gallery articles sit just below
# at y≈60-65%, so swipe horizontally there.

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd: { timeout: 10000 }
- swipe: { start: "50%, 25%", end: "50%, 75%", duration: 500 }
- waitForAnimationToEnd: { timeout: 2000 }

- scrollUntilVisible:
    element: { text: "Mehr" }
    direction: DOWN
    speed: 60
    centerElement: true
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery3_initial

# Gallery articles are below "Mehr" header; swipe at y=62% targets the article row.
- swipe: { start: "85%, 62%", end: "15%, 62%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery3_RTL_1
- swipe: { start: "85%, 62%", end: "15%, 62%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery3_RTL_2
- swipe: { start: "85%, 62%", end: "15%, 62%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery3_RTL_3

# LTR back
- swipe: { start: "15%, 62%", end: "85%, 62%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- swipe: { start: "15%, 62%", end: "85%, 62%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- swipe: { start: "15%, 62%", end: "85%, 62%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery3_LTR_back
