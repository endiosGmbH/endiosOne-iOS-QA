appId: de.endios.one
---
# News widget — full suite (19 cases) — single-launch consolidated flow.
#
# Dashboard inventory (Product tab, top → bottom):
#   1-8.  Image / Offers / Places / Wetter widgets (no News content)
#   9.    News 2 (Basic Image, ContentHub airplane articles)
#  10.    Nachrichten Gallery #1 (One/Create co...) + Mehr
#  11.    Automative tile
#  12.    Quality Strip ("Nachrichten / Qualiy" — typo unique anchor)
#  13.    Regen weather (block)
#  14.    Feeds (RSS Tagesschau)
#  15.    Nachrichten Gallery #2 (Acceptance/Emerging) + Mehr
#  16.    Engineering Carousel ← News Carousel 18769
#
# Scroll-state strategy: STRICTLY BOTTOM→TOP after the dashboard inventory leaves
# us at Engineering area. We only scroll UP between cases. C110088 (RSS webview)
# is moved LAST — SFSafariViewController runs in a separate iOS process which
# Maestro's WebDriverAgent can't dismiss, so we relaunch the app once after C110088
# (sanctioned secondary-launch exception) to recover for the Auto tab cases.
#
# C110257 verifies Twitter/Youtube buttons VISIBLE only, no taps (taps would open
# Safari mid-flow, blocking the rest of the Product tab cases).
#
# Tile mapping:
#   Engineering Carousel — C110085, C110083, C110093, C110084, C110101, C110107, C110094
#   Quality Strip        — C110089, C110092, C110257 (anchor "Qualiy" typo)
#   News 2 (Basic Image) — C110087, C110091, C110095
#   Feeds (RSS)          — C110090, C110088 (LAST, before relaunch)
#   Auto tab             — C110097, C110100, C110098
#
# Native modal X-close: tapOn { point: "92%, 10%" } (top-right).

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd: { timeout: 10000 }
- swipe: { start: "50%, 25%", end: "50%, 75%", duration: 500 }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/00_dashboard_top

