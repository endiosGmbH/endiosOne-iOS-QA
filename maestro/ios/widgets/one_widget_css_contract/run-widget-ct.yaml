appId: de.endios.one
---
# =============================================================================
# CSS Contract [CT] — full suite, single-launch consolidated flow
# v17 (2026-06-02) — corrected coords + DocList PDF route + ordered to keep
# Safari last (Safari is undismissable on sim → would break back-nav).
#
# TARGET DEVICE: iPhone 16 Pro / iOS 18.4  (UDID BD791DDE-CE86-4ADA-AE09-EDAF6A647CE8)
# Run:
#   $HOME/.maestro/bin/maestro --udid <udid> test maestro/widgets/one_widget_css_contract/run-widget-ct.yaml \
#     --format junit --output /tmp/verify-widget/run-widget-ct/
#
# TILE MAP (CSS tab, AFTER pull-to-refresh — bounds verified 2026-05-26):
#   "Verträge" canonical          (17%, 60%)  bounds [3,461][133,591]
#   "Verträge Nocontract"         (50%, 60%)  bounds [135,461][266,591]
#   "Verträge nocontext,nobutton" (83%, 60%)  bounds [268,461][399,591]
#   "Verträge PDF" (widget 18866) (17%, 75%)  bounds [3,593][133,724]
#
# DEVICE-ONLY CASES (NOT exercised here — captured pre-state, mark 🚫 Blocked):
#   116528 Safari close, 116529-116532 Abschlag modal, 116534 share sheet,
#   116535/116536 Print. These crash or use separate-process system views under
#   Rosetta on iPhone 16 Pro. Resolve on iPhone 17 Pro (6DA2CF14) via the
#   AppleScript + cliclick recipe — see memory project_css_contract_widget.
#
# HARD RULES (see memory):
#   - NEVER tap the Abschlag row on sim — guaranteed crash, takes flow down.
#   - PDF viewer reached via the "Verträge PDF" tile → DocumentListView row,
#     NOT the canonical overview Dokumente row (that opens WEITERE PRODUKTE).
#   - Open WEITERE PRODUKTE (Safari) LAST — it cannot be dismissed on sim.
#   - PDF dismiss = "Schließen" text tap only, no coord fallback.
# =============================================================================

- launchApp:
    appId: "de.endios.one"
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 4000
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible: "Überspringen"
    commands:
      - tapOn: "Überspringen"
      - waitForAnimationToEnd:
          timeout: 1500
- tapOn:
    text: "CSS"
- waitForAnimationToEnd:
    timeout: 4000
# Pull-to-refresh so the tile grid settles into its canonical 60%/75% layout.
- swipe:
    start: "50%, 25%"
    end: "50%, 75%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/00-css-tab-baseline

# =============================================================================
# Subsection 13652 — Widget Tile & Configuration   (116513-116515)
# =============================================================================
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116513-vertraege-tile-image
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116514-vertraege-tile-title

- tapOn:
    point: "17%, 60%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116515-selection-nav-title

# =============================================================================
# Subsection 13653 — Selection screen content   (116516-116520)
# =============================================================================
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116516-selection-screen-opened
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116517-selection-headline-description
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116518-kundennummer-row
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116519-address-label
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116520-contract-list

# ---- 116521-116524 Tap Test Regenwasser → Contract Overview --------------
- tapOn:
    text: "Test Regenwasser"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116521-contract-overview-opened
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116522-overview-config-values
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116523-price-info
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116524-contract-info

# ---- 116529-116532 🚫 BLOCKED on sim — Abschlag tap crashes the app -------
# Do NOT tap the Abschlag row here. Capture the overview as pre-tap evidence;
# resolve the modal chain on iPhone 17 Pro (see memory recipe).
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116529-116532-abschlag-blocked-sim

# ---- 116525 + 116526 Scroll to surface Dokumente section -----------------
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116525-documents-section
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116526-action-button-visible

# ---- 116538 Back: Overview → Selection  (do BEFORE opening Safari) --------
- runFlow:
    when:
      visible: "Zurück"
    commands:
      - tapOn: "Zurück"
      - waitForAnimationToEnd:
          timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116538-back-on-selection

# ---- 116539 Back: Selection → CSS Tab ------------------------------------
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116539-back-on-css-tab

# =============================================================================
# 116540 / 116533 / 116541 / 116537 / 116542 — PDF via "Verträge PDF" tile
# Tile (17%,75%) → WEITER routes DIRECTLY to DocumentListView (widget 18866),
# skipping Selection + Overview. DocList row "Vertrag PDF-Dokument" at (50%,28%).
# =============================================================================
- scrollUntilVisible:
    element:
      text: "Invoice QA"
    direction: UP
    timeout: 4000
    centerElement: false
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    point: "17%, 75%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116540-pdf-document-screen

# ---- 116533 / 116541 Tap DocList row → in-app PDF viewer -----------------
- tapOn:
    point: "50%, 28%"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116533-116541-pdf-viewer-opened

# ---- 116534 🚫 BLOCKED on sim — share sheet does not present -------------
# Tap the share button to capture the attempt; UIActivityViewController is a
# separate-process system view that won't render under Maestro on iPhone 16 Pro.
- tapOn:
    point: "92%, 9%"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116534-116536-sharesheet-print-blocked-sim
# Dismiss anything that did slide up before continuing.
- swipe:
    start: "50%, 5%"
    end: "50%, 95%"
- waitForAnimationToEnd:
    timeout: 2000

# ---- 116537 / 116542 Close PDF viewer (Schließen) → back to DocList ------
- runFlow:
    when:
      visible: "Schließen"
    commands:
      - tapOn: "Schließen"
      - waitForAnimationToEnd:
          timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116537-116542-back-on-doclist

# Recover to CSS tab
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500
- scrollUntilVisible:
    element:
      text: "Invoice QA"
    direction: UP
    timeout: 4000
    centerElement: false
- waitForAnimationToEnd:
    timeout: 1500

# =============================================================================
# Subsection 13654 — Alternative Flows & Negative Scenarios
# =============================================================================

# ---- 116543 No-Contract empty-state screen -------------------------------
- tapOn:
    point: "50%, 60%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116543-no-contract-screen
# Recover to CSS tab
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500
- scrollUntilVisible:
    element:
      text: "Invoice QA"
    direction: UP
    timeout: 4000
    centerElement: false
- waitForAnimationToEnd:
    timeout: 1500

# ---- 116544 + 116545 nocontext,nobutton tile -----------------------------
- tapOn:
    point: "83%, 60%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116544-selection-no-kundennummer
- tapOn:
    point: "50%, 50%"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116545-overview-no-action-button
# Recover to CSS tab
- runFlow:
    when:
      visible: "Zurück"
    commands:
      - tapOn: "Zurück"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2000
- scrollUntilVisible:
    element:
      text: "Invoice QA"
    direction: UP
    timeout: 4000
    centerElement: false
- waitForAnimationToEnd:
    timeout: 1500

# =============================================================================
# 116527 / 116528 — WEITERE PRODUKTE webview  (RUN LAST — Safari traps flow)
# Re-enter canonical contract, open the action button. SFSafariViewController
# cannot be dismissed on sim, so this is the final step; 116528 is 🚫 Blocked.
# =============================================================================
- tapOn:
    point: "17%, 60%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- tapOn:
    text: "Test Regenwasser"
- waitForAnimationToEnd:
    timeout: 5000
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- runFlow:
    when:
      visible: "WEITERE PRODUKTE"
    commands:
      - tapOn: "WEITERE PRODUKTE"
      - waitForAnimationToEnd:
          timeout: 15000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116527-webview-opened
# 116528 Safari close (X / Done) is undismissable on sim — capture & stop.
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116528-safari-close-blocked-sim
