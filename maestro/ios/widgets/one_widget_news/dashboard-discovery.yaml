appId: de.endios.one
---
# Dashboard discovery — fast probe to capture the current Product tab tile inventory.
# Used to re-anchor after the prior dataset (Qualiy/Newww/Engineering) rotated out.

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd: { timeout: 10000 }

- swipe: { start: "50%, 25%", end: "50%, 75%", duration: 500 }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/disc_00

- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 600 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/disc_01

- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 600 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/disc_02

- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 600 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/disc_03

- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 600 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/disc_04

- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 600 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/disc_05
