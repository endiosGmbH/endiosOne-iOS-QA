appId: de.endios.one
---
# News widget — fallback flow for the 12 cases not exercised by the consolidated
# run (which died at C110101 after C110088 left scroll state ambiguous).
#
# Cases covered:
#   12903: C110083 (Carousel preview → direct Detail)
#   12904: C110101 (AppBar + Back via Carousel Mehr), C110107 (Categories filter)
#   12905: C110091, C110092, C110093, C110094, C110095, C110257
#   12909: C110097, C110098, C110100
#
# Fresh launchApp gives deterministic scroll position. Order chosen so each
# case's anchor is unambiguous relative to the prior case's exit state.

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd: { timeout: 10000 }
- swipe: { start: "50%, 25%", end: "50%, 75%", duration: 500 }
- waitForAnimationToEnd: { timeout: 2000 }

# ===== 12904 List View =====

# C110101 — Nachrichten Carousel "Mehr" → AppBar title + Back.
# Fresh dashboard top; Carousel "Mehr" is the first occurrence scrolling DOWN.
- scrollUntilVisible:
    element: { text: "Mehr" }
    direction: DOWN
    speed: 60
- tapOn: { text: "Mehr", index: 0 }
- waitForAnimationToEnd: { timeout: 4000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110101_appbar
- runFlow:
    when: { visible: "Back" }
    commands:
      - tapOn: { text: "Back" }
      - waitForAnimationToEnd: { timeout: 1500 }

# ===== 12903 Widget Tile =====

# C110083 — Carousel preview tap → DIRECT Detail (skip List View).
# After Back from C110101 we're at the Carousel area; tap a Carousel preview
# (not the Mehr button) to verify direct-detail behaviour.
- tapOn: { point: "28%, 30%" }
- waitForAnimationToEnd: { timeout: 4000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110083_direct_detail
- tapOn: { point: "92%, 10%" }
- waitForAnimationToEnd: { timeout: 2000 }
- runFlow:
    when: { visible: "Back" }
    commands:
      - tapOn: { text: "Back" }
      - waitForAnimationToEnd: { timeout: 1500 }

