appId: de.endios.one
---
# Focused fallback for 110373 — Single group → directly to PDF.
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    when:
      visible: "Don't Allow"
    commands:
      - tapOn: "Don't Allow"
- runFlow:
    when:
      visible: "Ask App Not to Track"
    commands:
      - tapOn: "Ask App Not to Track"
- waitForAnimationToEnd:
    timeout: 4000
- tapOn:
    point: "85%, 96%"
- waitForAnimationToEnd:
    timeout: 3000
- swipe:
    start: "50%, 25%"
    end: "50%, 75%"
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: 110373-A-tiles
- tapOn:
    text: "Single group"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: 110373-B-direct-pdf
