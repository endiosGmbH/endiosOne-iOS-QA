# === 110563 — Datei4.zip → Safari → Download → Return-to-app
# Note: Safari is already in background from the earlier .docx handoff, so the
# "Return to endios one Debug" indicator is NOT shown on this second handoff.
# Use `launchApp clearState: false` to foreground the app instead.
- runFlow:
    when:
      visible: "Datei4.zip"
    commands:
      - tapOn:
          text: "Datei4.zip"
      - waitForAnimationToEnd:
          timeout: 3000
      - takeScreenshot: 110563-datei4-zip-handler
      - runFlow:
          when:
            visible: "Download"
          commands:
            - tapOn:
                text: "Download"
            - waitForAnimationToEnd:
                timeout: 2000
            - takeScreenshot: 110563-datei4-zip-download-tapped
      # Recover from Safari — indicator not present, use launchApp to foreground.
      # The app resumes on the Product tab (last-known state), so tap CSS to
      # ensure the bell tile case (110564) sees the CSS dashboard.
      - launchApp:
          clearState: false
          clearKeychain: false
      - waitForAnimationToEnd:
          timeout: 2500
      - runFlow:
          when:
            visible: "CSS"
          commands:
            - tapOn:
                text: "CSS"
            - waitForAnimationToEnd:
                timeout: 1500

# Close CASE 5 detail → list
- runFlow:
    when:
