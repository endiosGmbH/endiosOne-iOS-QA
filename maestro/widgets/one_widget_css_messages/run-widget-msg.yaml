# === 110556 + 110560 + 110561 + 110562 + 110563 + C116431 — CASE 5 detail
- tapOn:
    point: "50%, 85%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: 110556-case5-multiple-files-detail

# === 110560 + C116431 — Datei1.docx → docx viewer → Share → Safari → Download → Return
- runFlow:
    when:
      visible: "Datei1.docx"
    commands:
      - tapOn:
          text: "Datei1.docx"
      # Long swipe-as-pause to let WKWebView render docx body (~20s)
      - swipe:
          start: "50%, 95%"
          end: "50%, 95%"
          duration: 12000
      - swipe:
          start: "50%, 95%"
          end: "50%, 95%"
          duration: 8000
      - takeScreenshot: 110560-datei1-docx-viewer
      # C116431 share-print — docx share button at y≈9% per hierarchy probe
      - tapOn:
          point: "92%, 9%"
      - waitForAnimationToEnd:
          timeout: 3500
      - takeScreenshot: C116431-step7-safari-download-dialog
      # Tap Download in Safari dialog (a11y-reachable)
      - runFlow:
          when:
            visible: "Download"
          commands:
            - tapOn:
                text: "Download"
            - waitForAnimationToEnd:
                timeout: 2000
            - takeScreenshot: C116431-step8-download-tapped
      # Return to app via the "Return to endios one Debug" indicator
      - runFlow:
          when:
            visible: "Return to endios one Debug"
          commands:
            - tapOn:
                text: "Return to endios one Debug"
            - waitForAnimationToEnd:
                timeout: 2500
            # Return-to-app puts us back on the docx viewer (still on nav
            # stack). Close it via Zurück to return to CASE 5 detail.
            - runFlow:
                when:
                  visible: "Zurück"
                commands:
                  - tapOn:
                      text: "Zurück"
                  - waitForAnimationToEnd:
                      timeout: 1200

