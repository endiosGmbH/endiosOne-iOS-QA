appId: de.endios.one
---
- launchApp:
    appId: de.endios.one
    clearState: true        # wipe app data for a totally fresh fetch
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 12000
- takeScreenshot: /tmp/verify-widget/hard-refresh/00_first_load
- swipe:
    start: 50%, 25%
    end: 50%, 75%
    duration: 600
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/hard-refresh/01_after_pull
- swipe:
    start: 5%, 85%
    end: 5%, 15%
    duration: 700
- takeScreenshot: /tmp/verify-widget/hard-refresh/02
