appId: de.endios.one
---
# C110107 — full Categories toggle cycle. Fresh launch so the dashboard
# scroll position is deterministic. The combined fallback drifted past
# Gallery after C110095, so `scrollUntilVisible "Mehr" DOWN` found nothing.

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd: { timeout: 10000 }
- swipe: { start: "50%, 25%", end: "50%, 75%", duration: 500 }
- waitForAnimationToEnd: { timeout: 2000 }

# Carousel "Mehr" appears first when scrolling DOWN; we need Gallery's "Mehr".
# Scroll until the first Mehr appears, then swipe past it to bring Gallery in.
- scrollUntilVisible:
    element: { text: "Mehr" }
    direction: DOWN
    speed: 60
    centerElement: true
- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- scrollUntilVisible:
    element: { text: "Mehr" }
    direction: DOWN
    speed: 60
    centerElement: true
- tapOn: { text: "Mehr", index: 0 }
- waitForAnimationToEnd: { timeout: 5000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110107_listview_filter
- tapOn: { text: "Categories" }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110107_dropdown_all_on
- tapOn: { text: "Regression" }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110107_regression_disabled
- tapOn: { text: "TEST" }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110107_only_qa_enabled
- tapOn: { text: "Regression" }
- waitForAnimationToEnd: { timeout: 1000 }
- tapOn: { text: "TEST" }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110107_all_filters_reenabled
- runFlow:
    when: { visible: "Back" }
    commands:
      - tapOn: { text: "Back" }
      - waitForAnimationToEnd: { timeout: 1500 }
