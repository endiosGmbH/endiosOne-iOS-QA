appId: de.endios.one
---
# News List View — hard-refresh + positive-scenario verification
# Forces a clean reinstall of app data so the freshest dashboard config is fetched.

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 12000
- takeScreenshot: /tmp/verify-widget/list-view-hr/00_dashboard

# Pull-to-refresh
- swipe:
    start: 50%, 25%
    end: 50%, 75%
    duration: 600
- waitForAnimationToEnd:
    timeout: 5000

# Open Basic tile → List View (positive C110087)
- assertVisible:
    text: "News 2"
- tapOn:
    text: "News 2"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: /tmp/verify-widget/list-view-hr/01_listview_appbar

# Capture top of list (positive C110088 - newest first; positive C110089 - description; positive C110090 - image)
- takeScreenshot: /tmp/verify-widget/list-view-hr/02_top_of_list

# Pull-to-refresh inside list (positive C-NEW-1)
- swipe:
    start: 50%, 30%
    end: 50%, 80%
    duration: 800
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/list-view-hr/03_after_pull_refresh

# Scroll through list
- swipe:
    start: 50%, 80%
    end: 50%, 25%
    duration: 700
- takeScreenshot: /tmp/verify-widget/list-view-hr/04_scroll1
- swipe:
    start: 50%, 80%
    end: 50%, 25%
    duration: 700
- takeScreenshot: /tmp/verify-widget/list-view-hr/05_scroll2
- swipe:
    start: 50%, 80%
    end: 50%, 25%
    duration: 700
- takeScreenshot: /tmp/verify-widget/list-view-hr/06_scroll3

# Look for inline category selector (positive C110107 rewritten)
- takeScreenshot: /tmp/verify-widget/list-view-hr/07_check_categories

# Tap a row → Article Detail (positive C-NEW-2)
# scroll back to top first
- swipe:
    start: 50%, 25%
    end: 50%, 90%
    duration: 700
- swipe:
    start: 50%, 25%
    end: 50%, 90%
    duration: 700
- takeScreenshot: /tmp/verify-widget/list-view-hr/08_back_at_top
- tapOn:
    point: 50%, 30%
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/list-view-hr/09_article_detail
