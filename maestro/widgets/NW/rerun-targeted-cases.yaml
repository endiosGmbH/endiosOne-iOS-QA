appId: de.endios.one
---
# Targeted re-run: C110093, C110085, C110096, C110097, C110099, C110100
# Single-launch with hard refresh (clearState + clearKeychain).
#
# C110085 — Carousel horizontal swipe rotation: target Carousel 18769 (bottom tile,
#           ~75% screen y) and Nachrichten Gallery (mid screen) at correct y-positions.
# C110093 — Article Detail X close + pull-down close (Nachrichten Carousel via Mehr).
# C110096 — Invalid RSS URL → empty state. Scan dashboard for invalid-config tile.
# C110097 — Empty RSS feed → empty state. Scan dashboard for empty-feed tile.
# C110099 — Special chars in image URLs render. Scan all News list views.
# C110100 — Connector unavailable. Cannot simulate; capture baseline tile state.

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 10000
- swipe:
    start: 50%, 25%
    end: 50%, 75%
    duration: 500
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/news-rerun/00_dashboard_top

# ===== C110085 — Nachrichten Gallery horizontal swipe (mid-dashboard) =====
# Scroll Nachrichten "Mehr" into view; the Gallery items sit just below the title row,
# centered around y=42-50% when the "Mehr" header is visible.
- scrollUntilVisible:
    element: { text: "Mehr" }
    direction: DOWN
    speed: 60
- waitForAnimationToEnd: { timeout: 1000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery_initial

# Multiple horizontal swipes RTL on Gallery row (y=42% targets the article preview cells)
- swipe: { start: "85%, 42%", end: "15%, 42%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery_after_RTL_1
- swipe: { start: "85%, 42%", end: "15%, 42%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery_after_RTL_2
- swipe: { start: "85%, 42%", end: "15%, 42%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery_after_RTL_3
# LTR back
- swipe: { start: "15%, 42%", end: "85%, 42%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- swipe: { start: "15%, 42%", end: "85%, 42%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- swipe: { start: "15%, 42%", end: "85%, 42%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_gallery_after_LTR

# ===== C110085 — Carousel 18769 horizontal swipe (bottom dashboard) =====
# Scroll further down so the bottom Carousel (Engineering In Time, 6 dots) is in view.
- swipe: { start: "50%, 80%", end: "50%, 30%", duration: 500 }
- swipe: { start: "50%, 80%", end: "50%, 30%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_carousel_initial

# The Carousel image area is around y=55-70%, dots at y=83%.
- swipe: { start: "85%, 60%", end: "15%, 60%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_carousel_after_RTL_1
- swipe: { start: "85%, 60%", end: "15%, 60%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_carousel_after_RTL_2
- swipe: { start: "85%, 60%", end: "15%, 60%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_carousel_after_RTL_3
# LTR back
- swipe: { start: "15%, 60%", end: "85%, 60%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- swipe: { start: "15%, 60%", end: "85%, 60%", duration: 700 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110085_carousel_after_LTR

# ===== C110093 — Article Detail X close + pull-down close (Nachrichten Carousel) =====
# Scroll up to find Nachrichten "Mehr" again
- scrollUntilVisible:
    element: { text: "Mehr" }
    direction: UP
    speed: 60
- tapOn: { text: "Mehr", index: 0 }
- waitForAnimationToEnd: { timeout: 4000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110093_a_listview
- tapOn: { point: "50%, 30%" }
- waitForAnimationToEnd: { timeout: 3000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110093_b_detail_with_x

# Test 1: X close
- tapOn: { point: "92%, 10%" }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110093_c_after_x_close

# Test 2: Re-open and try pull-down close (long swipe from very top down)
- tapOn: { point: "50%, 30%" }
- waitForAnimationToEnd: { timeout: 3000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110093_d_detail_pre_pulldown
# Pull-down: start above the table view scroll area (top safe-area, y=4%) → drag to mid
- swipe: { start: "50%, 4%", end: "50%, 70%", duration: 1500 }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110093_e_after_pulldown
# Recovery
- tapOn: { point: "92%, 10%" }
- waitForAnimationToEnd: { timeout: 1500 }
- runFlow:
    when: { visible: "Back" }
    commands:
      - tapOn: { text: "Back" }
      - waitForAnimationToEnd: { timeout: 1500 }

# ===== C110096 / C110097 / C110099 / C110100 — Negative scenario evidence =====
# Visit each News tile on the dashboard. Capture the tile state and the list view.
# If any tile shows empty/error state, that's evidence for C110096/C110097.

# News 2 (Basic, ContentHub)
- scrollUntilVisible:
    element: { text: "News 2" }
    direction: DOWN
    speed: 60
- takeScreenshot: /tmp/verify-widget/news-rerun/c110096_97_news2_tile
- tapOn: { text: "News 2" }
- waitForAnimationToEnd: { timeout: 4000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110096_97_news2_listview
- runFlow:
    when: { visible: "Back" }
    commands:
      - tapOn: { text: "Back" }
      - waitForAnimationToEnd: { timeout: 1500 }

# Quality Strip
- scrollUntilVisible:
    element: { text: "Qualiy" }
    direction: DOWN
    speed: 60
- takeScreenshot: /tmp/verify-widget/news-rerun/c110096_97_quality_tile
- tapOn: { text: "Qualiy" }
- waitForAnimationToEnd: { timeout: 4000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110096_97_quality_listview
- runFlow:
    when: { visible: "Back" }
    commands:
      - tapOn: { text: "Back" }
      - waitForAnimationToEnd: { timeout: 1500 }

# Feeds (RSS Tagesschau) — also serves C110099 image-render check
- scrollUntilVisible:
    element: { text: "Feeds" }
    direction: DOWN
    speed: 60
- takeScreenshot: /tmp/verify-widget/news-rerun/c110099_feeds_tile
- tapOn: { text: "Feeds" }
- waitForAnimationToEnd: { timeout: 5000 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110099_feeds_listview_top
# Scroll through to verify images render across many articles (special-char URL evidence)
- swipe: { start: "50%, 80%", end: "50%, 25%", duration: 500 }
- swipe: { start: "50%, 80%", end: "50%, 25%", duration: 500 }
- swipe: { start: "50%, 80%", end: "50%, 25%", duration: 500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110099_feeds_listview_mid
- swipe: { start: "50%, 80%", end: "50%, 25%", duration: 500 }
- swipe: { start: "50%, 80%", end: "50%, 25%", duration: 500 }
- takeScreenshot: /tmp/verify-widget/news-rerun/c110099_feeds_listview_bottom
- runFlow:
    when: { visible: "Back" }
    commands:
      - tapOn: { text: "Back" }
      - waitForAnimationToEnd: { timeout: 1500 }

# C110100 — Connector unavailable: capture all News tiles in their normal-rendered state
# (cannot trigger outage; this confirms tile graphics persist regardless of connector state).
- scrollUntilVisible:
    element: { text: "News 2" }
    direction: UP
    speed: 60
- takeScreenshot: /tmp/verify-widget/news-rerun/c110100_baseline_news2
- scrollUntilVisible:
    element: { text: "Mehr" }
    direction: DOWN
    speed: 60
- takeScreenshot: /tmp/verify-widget/news-rerun/c110100_baseline_carousel_gallery

- takeScreenshot: /tmp/verify-widget/news-rerun/zz_final_dashboard
