appId: de.endios.one
---
# C110094 Focused Retest — News Article Detail: Gallery image swipe + full-view close icon
# Target article: Quality Strip ("Qualiy" typo) — confirmed to render a "Gallery" section
# (per prior screenshot c110092_gallery_section.png — bird image inside Gallery card).
#
# Steps under test:
# 1. Open detail with Gallery section
# 2. Swipe RTL through gallery; capture frames to confirm image rotation
# 3. Swipe LTR back; capture frames
# 4. Tap image -> full-view image viewer
# 5. Verify close icon at TOP-RIGHT; tap to dismiss
# 6. Verify return to Detail with Gallery still visible (scroll preserved)

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd: { timeout: 10000 }

# Ensure we're on the Product tab (saved tab state may persist across launches)
- tapOn:
    text: "Product"
- waitForAnimationToEnd: { timeout: 2000 }

# baseline pull-to-refresh
- swipe: { start: "50%, 25%", end: "50%, 75%", duration: 500 }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_00_dashboard

# Scroll DOWN to Quality Strip tile
- scrollUntilVisible:
    element: { text: "Qualiy" }
    direction: DOWN
    centerElement: true
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_01_quality_tile

# Tap Qualiy strip -> opens Nachrichten List View
- tapOn: { text: "Qualiy" }
- waitForAnimationToEnd: { timeout: 5000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_02_listview

# Tap the article with the gallery (anchor "Newww" is unique to Deals/Testing/Newww row)
- tapOn: { text: "Newww" }
- waitForAnimationToEnd: { timeout: 5000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_03_detail_top

# Scroll within detail until Gallery section visible
- scrollUntilVisible:
    element: { text: "Gallery" }
    direction: DOWN
    centerElement: true
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_04_gallery_initial

# Horizontal swipe RTL #1 (right -> left, on the gallery image at y ~80%)
- swipe: { start: "85%, 80%", end: "15%, 80%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_05_gallery_RTL_1

# Horizontal swipe RTL #2
- swipe: { start: "85%, 80%", end: "15%, 80%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_06_gallery_RTL_2

# Horizontal swipe LTR (left -> right to go back)
- swipe: { start: "15%, 80%", end: "85%, 80%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_07_gallery_LTR_1

# Horizontal swipe LTR #2
- swipe: { start: "15%, 80%", end: "85%, 80%", duration: 500 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_08_gallery_LTR_2

# Tap the gallery image (bird, at y ~80%) to open full-view image viewer
- tapOn: { point: "50%, 80%" }
- waitForAnimationToEnd: { timeout: 3000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_09_fullview

# Tap close icon at top-right of full-view (X icon visible at ~90%, 9%)
- tapOn: { point: "90%, 9%" }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_10_after_close

# Verify still on Detail View (Gallery section should reappear or remain visible)
- runFlow:
    when:
      visible: "Gallery"
    commands:
      - takeScreenshot: /tmp/verify-widget/run-widget-nw/c110094r_11_gallery_preserved
