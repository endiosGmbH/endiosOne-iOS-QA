appId: de.endios.one
---
# Dashboard inventory diagnostic — capture every scroll position on the Product
# tab so we can locate the "Nachrichten" (Gallery 18765) and "Engineering"
# (Carousel 18769) tiles before rewriting the consolidated flow.

- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd: { timeout: 10000 }
- swipe: { start: "50%, 25%", end: "50%, 75%", duration: 500 }
- waitForAnimationToEnd: { timeout: 2000 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/inv_00_top

- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 600 }
- waitForAnimationToEnd: { timeout: 1500 }
- takeScreenshot: /tmp/verify-widget/run-widget-nw/inv_01

- swipe: { start: "50%, 80%", end: "50%, 20%", duration: 600 }
- waitForAnimationToEnd: { timeout: 1500 }
