appId: de.endios.one
---
# =============================================================================
# CSS Contract [CT] — full suite, single-launch consolidated flow (v5)
#
# Tile mapping on CSS tab:
#   "Verträge"                (18%, 53%) — canonical
#   "Verträge Nocontract"     (50%, 53%)
#   "Verträge nocontext,no…"  (82%, 53%)
#   "Verträge PDF"            (18%, 66%)
#
# v6 → v7 changes (after reading WidgetContractsCSS source):
# - Cells use `combinedAccessibilityTraits = .button` so the WHOLE row is a
#   single a11y button labeled with its title+subtitle. Tap by TEXT, not coord.
# - 116529/116532: tap "Abschlag" (budget billing row subtitle) → triggers
#   UIAlertController via showPopup(). Cancel="Abbrechen", confirm="OK".
# - 116533/116541: tap "PDF-Dokument" (Dokumente section subtitle) → opens
#   PDF viewer via coordinatorDelegate.showPDF().
# - 116527 wait extended to 15s for SFSafariViewController content load.
# - 116539 Safari-end dismiss: Maestro native `- back` + Fertig + swipe cascade.
# =============================================================================

- launchApp:
    appId: "de.endios.one"
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 4000
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible: "Überspringen"
    commands:
      - tapOn: "Überspringen"
      - waitForAnimationToEnd:
          timeout: 1500
- tapOn:
    text: "CSS"
- waitForAnimationToEnd:
    timeout: 4000
- swipe:
    start: "50%, 25%"
    end: "50%, 75%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/00-css-tab-baseline

# =============================================================================
# Subsection 13652 — Widget Tile & Configuration   (3 cases)
# =============================================================================
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116513-vertraege-tile-image
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116514-vertraege-tile-title

- tapOn:
    point: "18%, 53%"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116515a-willkommen-on-tile-tap
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116515-selection-nav-title

# =============================================================================
# Subsection 13653 — Main Flow (24 cases, reordered)
# =============================================================================
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116516-selection-screen-opened
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116517-selection-headline-description
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116518-kundennummer-row
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116519-address-label
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116520-contract-list

# ---- 116521 Tap Test Regenwasser → Contract Overview ---------------------
- tapOn:
    text: "Test Regenwasser"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116521-contract-overview-opened
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116522-overview-config-values
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116523-price-info
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116524-contract-info

# ---- 116529-116532 BLOCKED — Abschlag tap crashes the simulator app -------
# Verified via probe + simctl log: tapping the Abschlag row (any coord in its
# bounds) crashes the app process (`launchd_sim: service has crashed`).
# Likely the Rosetta/UIAlertController issue noted in memory. The cases that
# follow (open modal → OK → BB → Back → Cancel) cannot be exercised here.
# Snapshot the Overview as evidence and continue without triggering the tap,
# so the rest of Main Flow + 13654 can still run cleanly.
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116529-overview-pre-crash-tap-blocked
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116530-overview-pre-crash-tap-blocked
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116531-overview-pre-crash-tap-blocked
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116532-overview-pre-crash-tap-blocked

# ---- 116525 + 116526 Scroll to surface Dokumente section ----------------
# Two `- scroll` commands reliably move the content down on this overview
# (scrollUntilVisible didn't trigger when the element is present in hierarchy
# but below the fold — Maestro considered it "found").
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116525-documents-section
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116526-action-button-visible

# ---- 116533 Tap PDF row in Dokumente → PDF viewer ------------------------
# After 2 scrolls, Vertrag PDF-Dokument row is at y~83%. Tap (56%, 83%) +
# 8s wait. Then assert PDF state by checking "Schließen" or fullscreen PDF.
- tapOn:
    point: "56%, 83%"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116533-pdf-viewer-opened

# ---- 116534 Tap Share button → share sheet -------------------------------
# Wait 8s so the iOS share sheet finishes its slide-up animation BEFORE
# screenshot. v11/v14 captured the in-between (fullscreen PDF) at 6s.
- tapOn:
    point: "92%, 9%"
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116534-share-sheet

# ---- 116535 Tap Print row in share sheet → print view --------------------
# Print row in share sheet appears around y=72% on iPhone 16 Pro layout.
# Try text first, then coord fallback. Note: per memory project_css_invoice_widget,
# Print on simulator may not render a print preview — case may be Blocked.
- runFlow:
    when:
      visible: "Print"
    commands:
      - tapOn: "Print"
      - waitForAnimationToEnd:
          timeout: 5000
- runFlow:
    when:
      visible: "Drucken"
    commands:
      - tapOn: "Drucken"
      - waitForAnimationToEnd:
          timeout: 5000
# Coord fallback if text taps didn't fire
- tapOn:
    point: "50%, 72%"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116535-print-view

# ---- 116536 Cancel print view → back to share sheet ---------------------
- runFlow:
    when:
      visible: "Abbrechen"
    commands:
      - tapOn: "Abbrechen"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Cancel"
    commands:
      - tapOn: "Cancel"
      - waitForAnimationToEnd:
          timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116536-after-print-cancel

# ---- 116537 Close PDF viewer → back to Contract Overview -----------------
# PDF viewer X close button is labeled "Schließen" (German Close), bounds
# [8,56][49,100] → coord (7%, 9%). Dismiss share sheet first if visible.
- runFlow:
    when:
      visible: "Save to Files"
    commands:
      - tapOn:
          point: "50%, 6%"
          optional: true
      - waitForAnimationToEnd:
          timeout: 1500
      - swipe:
          start: "50%, 5%"
          end: "50%, 95%"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Schließen"
    commands:
      - tapOn: "Schließen"
      - waitForAnimationToEnd:
          timeout: 3000
# REMOVED: optional (7%, 9%) coord fallback was navigating BACK to Selection
# when PDF was already dismissed (it hit the Zurück button at [0,56][84,100]
# on the Overview). Trust the Schließen tap to land.
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116537-back-on-overview-after-pdf

# ---- 116527 Tap action button (WEITERE PRODUKTE) → web view --------------
# Extend wait to 15s so SFSafariViewController has time to load page content.
- runFlow:
    when:
      visible: "WEITERE PRODUKTE"
    commands:
      - tapOn: "WEITERE PRODUKTE"
      - waitForAnimationToEnd:
          timeout: 15000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116527-webview-opened

# ---- 116528 Dismiss webview → back to Contract Overview ------------------
# Multi-strategy: Fertig (DE) → Done (EN) → coord (5%, 3%) → swipe-down-from-top.
# Order changed: in DE sim, Fertig is the actual label — Done check ran first
# and missed in v4 because the text isn't there.
- runFlow:
    when:
      visible: "Fertig"
    commands:
      - tapOn: "Fertig"
      - waitForAnimationToEnd:
          timeout: 3000
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
      - waitForAnimationToEnd:
          timeout: 3000
- tapOn:
    point: "5%, 3%"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- swipe:
    start: "50%, 3%"
    end: "50%, 90%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116528-back-on-overview-after-done

# ---- 116538 Back from Contract Overview → Contract Selection -------------
- runFlow:
    when:
      visible: "Zurück"
    commands:
      - tapOn: "Zurück"
      - waitForAnimationToEnd:
          timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116538-back-on-selection

# ---- 116539 Back from Contract Selection → CSS Tab -----------------------
# If a stale Safari is still on top (carryover from 116528), use Maestro's
# native `- back` command which closes the topmost modal/sheet (works for
# SFSafariViewController where text-based "Fertig"/"Done" taps fail).
- runFlow:
    when:
      visible: "Fertig"
    commands:
      - back
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Done"
    commands:
      - back
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116539-back-on-css-tab

# =============================================================================
# Subsection 13654 — Alternative Flows & Negative Scenarios (6 cases)
# =============================================================================

- scrollUntilVisible:
    element:
      text: "Invoice QA"
    direction: UP
    timeout: 4000
    centerElement: false
- waitForAnimationToEnd:
    timeout: 1500

# ---- 116540 PDF Document screen ------------------------------------------
- tapOn:
    point: "18%, 66%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116540-pdf-document-screen

# ---- 116541 Tap PDF row → PDF viewer -------------------------------------
