          timeout: 2500
- runFlow:
    when:
      visible: "Fertig"
    commands:
      - tapOn: "Fertig"
      - waitForAnimationToEnd:
          timeout: 2500
- tapOn:
    point: "8%, 8%"
    optional: true
- waitForAnimationToEnd:
    timeout: 2500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116542-back-on-pdf-doc-screen

# Recover to CSS tab
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500
- scrollUntilVisible:
    element:
      text: "Invoice QA"
    direction: UP
    timeout: 4000
    centerElement: false
- waitForAnimationToEnd:
    timeout: 1500

# ---- 116543 No-Contract screen -------------------------------------------
- tapOn:
    point: "50%, 53%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116543-no-contract-screen

# Recover to CSS tab
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500
- scrollUntilVisible:
    element:
      text: "Invoice QA"
    direction: UP
    timeout: 4000
    centerElement: false
- waitForAnimationToEnd:
    timeout: 1500

# ---- 116544 + 116545 Verträge nocontext,nobutton tile --------------------
- tapOn:
    point: "82%, 53%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116544-selection-no-kundennummer
# Tap first contract row to open overview
- tapOn:
    point: "50%, 50%"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116544-overview-no-kundennummer
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116545-overview-no-action-button

# Final cleanup back to CSS tab
- runFlow:
    when:
      visible: "Zurück"
    commands:
      - tapOn: "Zurück"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/99-final-on-css-tab
