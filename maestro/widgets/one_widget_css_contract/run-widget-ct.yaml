- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/116541-pdf-viewer-from-doclist

# ---- 116542 Close PDF viewer → PDF Document screen -----------------------
- runFlow:
    when:
      visible: "Done"
    commands:
      - tapOn: "Done"
