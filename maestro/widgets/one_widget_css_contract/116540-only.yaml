appId: de.endios.one
---
# =============================================================================
# CSS Contract [CT] — focused flow for 116540 re-test on widget 18866
#
# User reports widget 18866 (NOT 18862) is the PDF-only Document screen tile.
# We've confirmed Tile D "Verträge PDF" (18%, 66%) = widget 18862. So widget
# 18866 must be one of the other 3 tiles (A/B/C).
#
# This flow taps each non-18862 tile and captures the first content screen
# AFTER the WEITER on Willkommen, so the user can identify which is 18866 +
# whether it shows the PDF Document screen (Dokumente only, no Preisinformation).
# =============================================================================

- launchApp:
    appId: "de.endios.one"
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 4000
- runFlow:
    when:
      visible: "Skip"
    commands:
      - tapOn: "Skip"
      - waitForAnimationToEnd:
          timeout: 1500
- runFlow:
    when:
      visible: "Überspringen"
    commands:
      - tapOn: "Überspringen"
      - waitForAnimationToEnd:
          timeout: 1500
- tapOn:
    text: "CSS"
- waitForAnimationToEnd:
    timeout: 4000
- swipe:
    start: "50%, 25%"
    end: "50%, 75%"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-00-css-tab-baseline

# ---------- Tile A: "Verträge" canonical (18%, 53%) — drill into contract --
- tapOn:
    point: "18%, 53%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileA-vertraege-selection
- tapOn:
    text: "Test Regenwasser"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileA-overview-top
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileA-overview-bottom
# Recover to CSS Tab via two Backs (overview→selection→tab)
- runFlow:
    when:
      visible: "Zurück"
    commands:
      - tapOn: "Zurück"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500

# ---------- Tile B: "Verträge Nocontract" (50%, 53%) — empty state --------
- tapOn:
    point: "50%, 53%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileB-nocontract-content
# Try drilling — if there's a content section
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileB-content-scrolled
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500

# ---------- Tile C: "Verträge nocontext,no…" (82%, 53%) -------------------
- tapOn:
    point: "82%, 53%"
- waitForAnimationToEnd:
    timeout: 5000
- runFlow:
    when:
      visible: "WEITER"
    commands:
      - tapOn: "WEITER"
      - waitForAnimationToEnd:
          timeout: 4000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileC-nocontext-selection
- tapOn:
    text: "Test Regenwasser"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileC-overview-top
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- scroll
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-tileC-overview-bottom
- runFlow:
    when:
      visible: "Zurück"
    commands:
      - tapOn: "Zurück"
      - waitForAnimationToEnd:
          timeout: 2000
- runFlow:
    when:
      visible: "Back"
    commands:
      - tapOn: "Back"
      - waitForAnimationToEnd:
          timeout: 2500

- takeScreenshot: /tmp/verify-widget/run-widget-ct/18866-99-final-on-css-tab
