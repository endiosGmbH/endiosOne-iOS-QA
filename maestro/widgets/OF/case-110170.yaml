- tapOn:
    point: "50%,50%"
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: /tmp/verify-widget/OF/case-110170/step_1_detail_top
- swipe:
    direction: UP
    duration: 800
- takeScreenshot: /tmp/verify-widget/OF/case-110170/step_2_detail_mid
- swipe:
    direction: UP
    duration: 800
- takeScreenshot: /tmp/verify-widget/OF/case-110170/step_3_detail_bottom
- swipe:
    direction: UP
    duration: 800
- takeScreenshot: /tmp/verify-widget/OF/case-110170/step_4_detail_further
