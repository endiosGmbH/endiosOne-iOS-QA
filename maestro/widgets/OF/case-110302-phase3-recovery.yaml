appId: de.endios.one
name: "[OF] 110302 phase 3 — Recovery (Wi-Fi back on)"
tags:
  - offers
# Phase 3: wrapper has re-enabled host Wi-Fi. Pull-to-refresh the dashboard
# and re-enter Feed. We want proof the offers list comes back without
# requiring a full app reinstall — i.e. the offline state was transient.
---
- launchApp:
    appId: de.endios.one
    clearState: false
    clearKeychain: false
- waitForAnimationToEnd:
    timeout: 6000
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: /tmp/verify-widget/run-widget-of/110302_06_dashboard_recovered
- runFlow:
    when:
      visible: "Offer test"
    commands:
      - tapOn: "Offer test"
      - extendedWaitUntil:
          visible: "Angebote"
          timeout: 10000
      - takeScreenshot: /tmp/verify-widget/run-widget-of/110302_07_feed_recovered
