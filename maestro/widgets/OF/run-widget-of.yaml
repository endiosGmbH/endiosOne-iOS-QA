# Consolidated single-launch flow for Offers Widget [OF] — TestRail Run R784.
# Last regenerated 2026-05-11.
#
# Pre-req (set BEFORE running):
#   xcrun simctl location booted set 53.5511,9.9937       (Hamburg, persists)
#
# Tile mapping (Claude Automation 1020, TEST):
#   Dashboard tile scan                     → 110164 (all tile types render)
#   QA Carousel cards (in-tile, ~y=85%)     → 110297 (in-tile swipe RTL/LTR)
#   QA Mehr (text:"Mehr" index:0) → Feed    → 110165, 110166, 110298, 110167,
#                                              110300, 110301, 110169, 110299,
#                                              110168
#   QA Detail (Usage offer)                 → 110170, 110304, 110305, 110306,
#                                              110307 (close X attempt — Fail
#                                              evidence per known bug), 110303
#   V tile (text "V...")                    → 110175 (empty/partial state)
#
# Cases NOT in this consolidated flow (fallback flows generated separately):
#   110296 (article preview → Detail) — Detail has no close affordance in
#          this build; covered by maestro/widgets/OF/case-110296-only.yaml
#   110302 (airplane mode)            — sim cannot reliably toggle device-
#          level airplane; Blocked.
#
# Coord notes (402x874 viewport):
#   QA Mehr             text:"Mehr" index:0
#   V tile Mehr         coord (22%, 66%)
#   Map toggle (right)  coord (92%, 7%)
#   Filter Min toggle   (85%, 78%)
#   Date Ab Beliebig    (50%, 62%)
#   Ab pill X-close     (92%, 30%)
#   Apple Maps row      (50%, 85%) on map picker
#   Location arrow      (90%, 85%) on Detail
#   WEB row             (50%, 27%)
#   Phone row           (50%, 34%)
#   Mail row            (50%, 41%)
#   Galerie 1st image   (28%, 60%)
#   Galerie viewer X    (92%, 11%) — top-RIGHT
#   SFSafari close X    (10%, 9%)  — top-LEFT
#   Detail close X      (92%, 9%)  — top-RIGHT (known bug: may not register)
#   Social expand       (50%, 94%)
#
# Known defects (re-confirm each run):
#   AGENCY-7333 — Carousel tile (widget 18783) overlapping text
#   Detail close-icon (110307) — historically Fail
#   AGENCY-7344 — Map View KATEGORIEN toggle doesn't update pins
---
- launchApp:
    appId: de.endios.one
    clearState: true
    clearKeychain: true
- waitForAnimationToEnd:
    timeout: 6000
# Sanctioned baseline pull-to-refresh (the ONLY one in this flow)
- swipe:
    start: 50%, 25%
    end: 50%, 75%
- waitForAnimationToEnd:
    timeout: 4000
