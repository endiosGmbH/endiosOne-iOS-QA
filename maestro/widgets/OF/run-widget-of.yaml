- takeScreenshot: /tmp/verify-widget/run-widget-of/00_dashboard
- swipe:
    start: 50%, 70%
    end: 50%, 30%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- takeScreenshot: /tmp/verify-widget/run-widget-of/00b_dashboard_lower
- swipe:
    start: 50%, 30%
    end: 50%, 70%
    duration: 600
- waitForAnimationToEnd:
